<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信群监控面板</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-header">
    <h2>群聊监控</h2>
    <span class="sidebar-subtitle">Bad Messages Monitor</span>
  </div>
  <ul class="nav-list">
    <li class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">
      <span class="nav-icon">&#9679;</span> 状态
    </li>
    <li class="nav-item" data-tab="groups" onclick="switchTab('groups')">
      <span class="nav-icon">&#9678;</span> 监控群组
    </li>
    <li class="nav-item" data-tab="admins" onclick="switchTab('admins')">
      <span class="nav-icon">&#9678;</span> 管理员
    </li>
    <li class="nav-item" data-tab="keywords" onclick="switchTab('keywords')">
      <span class="nav-icon">&#9998;</span> 关键词
    </li>
    <li class="nav-item" data-tab="settings" onclick="switchTab('settings')">
      <span class="nav-icon">&#9881;</span> 设置
    </li>
    <li class="nav-item" data-tab="alerts" onclick="switchTab('alerts')">
      <span class="nav-icon">&#9888;</span> 告警记录
    </li>
  </ul>
</nav>

<main class="main-content">
  <!-- Dashboard Tab -->
  <section id="tab-dashboard" class="tab-panel active">
    <h1>运行状态</h1>
    <div class="status-cards">
      <div class="status-card">
        <div class="card-label">监控状态</div>
        <div class="card-value" id="status-running">检查中...</div>
      </div>
      <div class="status-card">
        <div class="card-label">最后检查</div>
        <div class="card-value" id="status-last-check">-</div>
      </div>
      <div class="status-card">
        <div class="card-label">监控群组</div>
        <div class="card-value" id="status-groups">0</div>
      </div>
      <div class="status-card">
        <div class="card-label">管理员</div>
        <div class="card-value" id="status-admins">0</div>
      </div>
      <div class="status-card">
        <div class="card-label">今日检测</div>
        <div class="card-value" id="status-detected">0</div>
      </div>
    </div>
    <div class="bot-controls">
      <button class="btn btn-success" onclick="startBot()">启动监控</button>
      <button class="btn btn-danger" onclick="stopBot()">停止监控</button>
    </div>
    <div id="toast-container"></div>
  </section>

  <!-- Groups Tab -->
  <section id="tab-groups" class="tab-panel">
    <h1>监控群组</h1>
    <div class="toolbar">
      <input type="text" id="group-name-input" placeholder="输入群聊名称">
      <button class="btn btn-primary" onclick="addGroup()">添加群组</button>
      <button class="btn btn-secondary" onclick="discoverSessions()">从微信加载</button>
    </div>
    <div id="session-list" class="session-list" style="display:none"></div>
    <table id="groups-table">
      <thead><tr><th>群名称</th><th>状态</th><th>添加时间</th><th>操作</th></tr></thead>
      <tbody id="groups-tbody"></tbody>
    </table>
  </section>

  <!-- Admins Tab -->
  <section id="tab-admins" class="tab-panel">
    <h1>管理员</h1>
    <div class="toolbar">
      <input type="text" id="admin-name-input" placeholder="管理员昵称">
      <input type="text" id="admin-wxid-input" placeholder="微信号">
      <button class="btn btn-primary" onclick="addAdmin()">添加管理员</button>
    </div>
    <table id="admins-table">
      <thead><tr><th>昵称</th><th>微信号</th><th>状态</th><th>添加时间</th><th>操作</th></tr></thead>
      <tbody id="admins-tbody"></tbody>
    </table>
  </section>

  <!-- Keywords Tab -->
  <section id="tab-keywords" class="tab-panel">
    <h1>关键词管理</h1>
    <p class="hint">每行一个关键词。修改后点击保存。可直接编辑 keywords.txt 文件。</p>
    <textarea id="keywords-textarea" rows="15" style="width:100%;font-family:monospace;"></textarea>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="saveKeywords()">保存关键词</button>
      <span id="keywords-save-status" class="save-status"></span>
    </div>
  </section>

  <!-- Settings Tab -->
  <section id="tab-settings" class="tab-panel">
    <h1>系统设置</h1>
    <div class="settings-form">
      <div class="form-group">
        <label>监控间隔（秒，5-300）</label>
        <input type="number" id="setting-interval" min="5" max="300">
      </div>
      <div class="form-group">
        <label>每次拉取消息数（5-100）</label>
        <input type="number" id="setting-history-count" min="5" max="100">
      </div>
      <div class="form-group">
        <label>LLM API Base URL</label>
        <input type="text" id="setting-llm-base-url" placeholder="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label>LLM API Key</label>
        <input type="password" id="setting-llm-api-key" placeholder="sk-...">
        <span class="hint">留空则使用 .env 文件中的配置</span>
      </div>
      <div class="form-group">
        <label>LLM 模型</label>
        <input type="text" id="setting-llm-model" placeholder="gpt-4o-mini">
      </div>
      <div class="form-group">
        <label>Max Tokens</label>
        <input type="number" id="setting-llm-max-tokens" min="64" max="8192">
      </div>
      <div class="form-group">
        <label>Temperature（0.0 - 2.0）</label>
        <input type="number" id="setting-llm-temperature" min="0" max="2" step="0.1">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      <span id="settings-save-status" class="save-status"></span>
    </div>
  </section>

  <!-- Alerts Tab -->
  <section id="tab-alerts" class="tab-panel">
    <h1>告警记录</h1>
    <div class="toolbar">
      <select id="alert-filter-verdict" onchange="loadAlerts(1)">
        <option value="">全部状态</option>
        <option value="malicious">确认恶意</option>
        <option value="benign">确认为良性</option>
        <option value="__none__">未审核</option>
      </select>
      <span id="alert-pagination" class="pagination-info"></span>
    </div>
    <table id="alerts-table">
      <thead><tr><th>群聊</th><th>发送者</th><th>内容预览</th><th>匹配关键词</th><th>审核结果</th><th>已通知</th><th>检测时间</th></tr></thead>
      <tbody id="alerts-tbody"></tbody>
    </table>
    <div class="pagination-controls" id="alert-page-controls"></div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
